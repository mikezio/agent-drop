<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" preserveAspectRatio="none">
  <defs>
    <filter id="roughA" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="1" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughB" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="1" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.3" xChannelSelector="B" yChannelSelector="R"/>
    </filter>
  </defs>

  <rect x="3" y="4" width="170" height="60" fill="#d3ad88" opacity="0.42" filter="url(#roughA)"/>
  <rect x="8" y="10" width="160" height="52" fill="#bf946c" opacity="0.22" filter="url(#roughB)"/>
</svg>
